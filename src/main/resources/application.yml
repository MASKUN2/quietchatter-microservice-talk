server:
  port: 8080

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: microservice-talk
  config:
    import: "optional:consul:"
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:19092}
        bindings:
          talkEvents-in-0:
            consumer:
              enableDlq: true
              dlqName: talk.dlq
      bindings:
        talkEvents-out-0:
          destination: talk
          content-type: application/json
        talkEvents-in-0:
          destination: talk
          group: ${spring.application.name}-group
          consumer:
            max-attempts: 3
            back-off-initial-interval: 1000
            back-off-max-interval: 10000
            back-off-multiplier: 2.0
    consul:
      host: ${CONSUL_HOST:localhost}
      port: 8500
      discovery:
        service-name: microservice-talk
        instance-id: ${spring.application.name}:${server.port}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/microservice-talk
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  flyway:
    enabled: true
    baseline-on-migrate: true
