server:
  port: 8080

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: microservice-talk
  cloud:
    stream:
      function:
        definition: "memberEvents"
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:19092}
        bindings:
          talkEvents-in-0:
            consumer:
              enableDlq: true
              dlqName: talk.dlq
          memberEvents-in-0:
            consumer:
              enableDlq: true
              dlqName: member.dlq
      bindings:
        talkEvents-out-0:
          destination: talk
          content-type: application/json
        talkEvents-in-0:
          destination: talk
          group: ${spring.application.name}-group
          content-type: application/json
          consumer:
            max-attempts: 3
            back-off-initial-interval: 1000
            back-off-max-interval: 10000
            back-off-multiplier: 2.0
        memberEvents-in-0:
          destination: member
          group: ${spring.application.name}-group
          content-type: application/json
          consumer:
            max-attempts: 3
            back-off-initial-interval: 1000
            back-off-max-interval: 10000
            back-off-multiplier: 2.0

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rdb-microservice-talk}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  flyway:
    enabled: true
    baseline-on-migrate: true
