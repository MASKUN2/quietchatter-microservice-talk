name: Build and Publish Docker Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Build with Gradle
      # 테스트는 시간 단축 및 외부 의존성(DB 등) 이슈를 피하기 위해 제외하고 실행 가능한 Jar 파일만 생성합니다.
      # 테스트를 CI에서 실행하고 싶다면 ./gradlew build 로 변경하세요.
      run: ./gradlew bootJar -x test

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to the Container registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          # 매 Push마다 고유한 Commit SHA 태그 생성 (예: a1b2c3d)
          type=sha,format=short
          # 기본 브랜치(main)에 Push되었을 때 latest 태그 추가
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Configure AWS Credentials
      if: github.event_name != 'pull_request'
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-northeast-2

    - name: Update Manifest and Push to S3
      if: github.event_name != 'pull_request'
      run: |
        SHORT_SHA=${GITHUB_SHA::7}
        sed -i "s/IMAGE_PLACEHOLDER/sha-${SHORT_SHA}/g" k8s/deployment.yaml
        aws s3 cp k8s/deployment.yaml s3://quietchatter-infra-assets/controlplane/manifests/microservice-talk.yaml --region ap-northeast-2

    - name: Notify deployment
      if: github.event_name != 'pull_request'
      run: |
        SHORT_SHA=${GITHUB_SHA::7}
        curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
          -H 'Content-type: application/json' \
          -d "{\"content\":\"[배포] ${{ github.repository }} sha-${SHORT_SHA} → S3 반영 완료. k3s 적용까지 최대 5분 소요.\"}"
